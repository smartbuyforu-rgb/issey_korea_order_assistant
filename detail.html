<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>상품 상세</title>
<style>
:root{--bg:#f3f2ef;--card:#fff;--line:#deddd8;--text:#20201e;--muted:#777772;--green:#167a35;--red:#a32929}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,"Noto Sans KR",sans-serif}.top{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:11px 13px;background:rgba(255,255,255,.97);border-bottom:1px solid var(--line)}.back{color:#222;text-decoration:none;font-weight:800;font-size:13px}.updated{font-size:10px;color:var(--muted)}.loading,.error{max-width:720px;margin:50px auto;padding:24px;text-align:center;background:#fff;border:1px solid var(--line);border-radius:12px}.error{color:#a32929}.page{display:none;max-width:1180px;margin:0 auto;padding:12px}.page.ready{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:18px}.gallery{min-width:0}.main-wrap{aspect-ratio:4/5;background:#e8e7e2;border-radius:14px;overflow:hidden;position:relative}.main{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in}.counter{position:absolute;right:8px;bottom:8px;background:rgba(0,0,0,.68);color:#fff;border-radius:999px;padding:4px 7px;font-size:10px}.thumbs{display:flex;gap:7px;overflow:auto;margin-top:8px}.thumb{width:62px;min-width:62px;aspect-ratio:4/5;border:2px solid transparent;border-radius:8px;padding:0;overflow:hidden;background:#ddd;cursor:pointer}.thumb.active{border-color:#111}.thumb img{width:100%;height:100%;object-fit:cover}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}.vendor{font-size:11px;color:#5f5f5b;font-weight:800}.title{font-size:24px;line-height:1.28;margin:7px 0 3px}.original{font-size:11px;color:#8a8984;line-height:1.4}.price{font-size:28px;font-weight:900;margin-top:13px}.jpy{font-size:12px;color:#666;margin-top:3px}.status{display:inline-block;margin-top:10px;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:800}.status.in{background:#e4f5e8;color:var(--green)}.status.out{background:#f7e6e6;color:var(--red)}.formula{margin-top:13px;border-top:1px solid #ecebe7;padding-top:11px;font-size:11px;line-height:1.75;color:#555}.formula-row{display:flex;justify-content:space-between;gap:12px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:14px}.button{display:flex;align-items:center;justify-content:center;min-height:42px;border:0;border-radius:9px;background:#191918;color:#fff;text-decoration:none;font:800 12px Arial,"Noto Sans KR",sans-serif;cursor:pointer}.button.quote{background:#03c75a}.button.order{grid-column:1/-1;background:#6c1717}.button.secondary{background:#fff;color:#222;border:1px solid #bbb}.official{display:block;margin-top:12px;text-align:center;color:#777;font-size:10px}.notice{font-size:10px;color:#777;line-height:1.55;margin-top:12px}.section h2{font-size:16px;margin:0 0 10px}.variant-select{width:100%;height:45px;border:1px solid #bbb;border-radius:9px;padding:0 10px;background:#fff}.variant-list{margin-top:9px}.variant{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;padding:9px 0;border-top:1px solid #ecebe7;font-size:12px}.variant:first-child{border-top:0}.variant-name{font-weight:700}.variant-meta{font-size:10px;color:#777;margin-top:3px}.badge{border-radius:999px;padding:4px 7px;font-size:10px;font-weight:800;align-self:start}.badge.in{background:#e4f5e8;color:var(--green)}.badge.out{background:#eee;color:#777}.size-wrap{overflow:auto;border:1px solid #ddd;border-radius:10px}.size-table{width:100%;border-collapse:collapse;min-width:520px;font-size:11px}.size-table th,.size-table td{border-bottom:1px solid #e5e4df;border-right:1px solid #e5e4df;padding:8px;text-align:center}.size-table th{background:#f2f1ed;position:sticky;top:0}.size-table tr:last-child td{border-bottom:0}.size-table th:last-child,.size-table td:last-child{border-right:0}.head-ko{font-weight:800}.head-ja{font-size:9px;color:#777;margin-top:2px}.description{font-size:13px;line-height:1.75;white-space:pre-wrap}.original-description{margin-top:12px;border-top:1px solid #eee;padding-top:10px;color:#777;font-size:11px;line-height:1.6;white-space:pre-wrap}.zoom{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.9);align-items:center;justify-content:center;padding:18px}.zoom.open{display:flex}.zoom img{max-width:100%;max-height:100%;object-fit:contain}.zoom button{position:absolute;right:14px;top:14px;border:0;border-radius:50%;width:38px;height:38px;background:#fff;font-size:24px;cursor:pointer}@media(max-width:760px){.page.ready{display:block}.title{font-size:21px}.main-wrap{border-radius:0}.page{padding:0}.right{padding:10px}.gallery{padding-top:8px}.card{border-radius:12px}}
</style>
</head>
<body>
<header class="top"><a class="back" href="index.html">← 상품 목록</a><span id="updated" class="updated"></span></header>
<div id="loading" class="loading">상품 정보를 불러오는 중입니다…</div><div id="error" class="error" hidden></div>
<main id="page" class="page">
<section class="gallery"><div class="main-wrap"><img id="mainImage" class="main" alt=""><span id="counter" class="counter"></span></div><div id="thumbs" class="thumbs"></div></section>
<div class="right">
  <section class="card"><div id="vendor" class="vendor"></div><h1 id="title" class="title"></h1><div id="original" class="original"></div><div id="price" class="price"></div><div id="jpy" class="jpy"></div><span id="status" class="status"></span><div id="formula" class="formula"></div>
    <div class="actions"><button id="copyLink" class="button" type="button">상품 링크 복사</button><a id="quote" class="button quote" target="_blank" rel="noopener">견적 문의</a><button id="order" class="button order" type="button">색상·사이즈 선택 후 주문 요청</button><a class="button secondary" href="index.html">목록으로 돌아가기</a></div>
    <a id="official" class="official" target="_blank" rel="noopener">이세이 미야케에서 실제 재고 확인 ↗</a><div class="notice">이 페이지는 마지막 수집 시점의 참고 정보입니다. 주문 전에 공식 사이트에서 실제 재고·가격을 다시 확인해야 합니다.</div>
  </section>
  <section class="card section"><h2>색상·사이즈 선택</h2><select id="variantSelect" class="variant-select"></select><div id="variants" class="variant-list"></div></section>
  <section id="sizeSection" class="card section" hidden><h2>실측 사이즈표</h2><div id="sizeChart"></div></section>
  <section class="card section"><h2>상품 설명</h2><div id="description" class="description"></div><details id="jaDetails" class="original-description"><summary>일본어 원문 보기</summary><div id="descriptionJa"></div></details></section>
</div>
</main>
<div id="zoom" class="zoom"><button id="zoomClose" type="button">×</button><img id="zoomImage" alt="확대 이미지"></div>
<script src="data/catalog.js"></script>
<script>
const $=id=>document.getElementById(id),payload=window.__ISSEY_CATALOG__||{products:[]};
const won=v=>Number.isFinite(Number(v))?Number(v).toLocaleString('ko-KR')+'원':'-';const yen=v=>Number.isFinite(Number(v))?'¥'+Number(v).toLocaleString('ja-JP'):'-';
const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const headerMap={'サイズ':'사이즈','着丈':'총장','身幅':'가슴너비','肩幅':'어깨너비','袖丈':'소매길이','裄丈':'화장','総丈':'총길이','股下':'밑위 아래 길이','ウエスト':'허리','ウエスト置き寸':'허리 단면','ヒップ':'엉덩이','横幅':'가로','高さ':'높이','マチ':'폭','重さ':'무게'};
function headerKo(v){const raw=String(v||'');for(const [ja,ko] of Object.entries(headerMap)){if(raw.includes(ja))return ko+(raw.includes('(cm)')?'(cm)':'')}return raw}
function getProduct(){const q=new URLSearchParams(location.search);const h=q.get('handle'),id=q.get('id');return (payload.products||[]).find(p=>(h&&p.handle===h)||(id&&String(p.id)===id))}
function render(p){document.title=(p.title_ko||p.title_ja||'상품 상세')+' · ISSEY';$('updated').textContent=payload.generated_at||'';$('vendor').textContent=p.vendor||'ISSEY MIYAKE';$('title').textContent=p.title_ko||p.title_ja||'상품명 없음';$('original').textContent=p.title_ja||'';$('price').textContent=won(p.price_krw);$('jpy').textContent='일본 판매가 '+yen(p.price_jpy);$('status').textContent=p.available?'재고 있음':'전체 품절';$('status').className='status '+(p.available?'in':'out');$('quote').href=payload.quote_url||'https://blog.naver.com/pilkyu01/224353040280';$('official').href=p.url||'#';
 const fx=payload.exchange_rate||{},pr=payload.pricing||{},j=Number(p.price_jpy||0),rate=Number(fx.rate||0),base=Math.round(j*rate),markup=Math.round(base*Number(pr.markup_percent||0)/100);$('formula').innerHTML=`<div class="formula-row"><span>적용 환율</span><b>1엔 = ${rate.toFixed(4)}원</b></div><div class="formula-row"><span>환율 환산</span><span>${won(base)}</span></div><div class="formula-row"><span>가산 ${pr.markup_percent??4}%</span><span>${won(markup)}</span></div><div class="formula-row"><span>고정 비용</span><span>${won(pr.fixed_fee_krw??25000)}</span></div><div class="formula-row"><span>반올림 후 예상가</span><b>${won(p.price_krw)}</b></div><div>환율 출처: ${esc(fx.source||'-')} · ${esc(fx.updated_at||'-')}</div>`;
 const images=[...(p.images||[])];if(p.image&&!images.includes(p.image))images.unshift(p.image);let current=0;$('thumbs').innerHTML='';function select(i){current=i;$('mainImage').src=images[i]||'';$('counter').textContent=images.length?(i+1)+' / '+images.length:'NO IMAGE';[...$('thumbs').children].forEach((b,n)=>b.classList.toggle('active',n===i))}images.forEach((src,i)=>{const b=document.createElement('button');b.className='thumb';b.type='button';b.innerHTML=`<img src="${esc(src)}" alt="${esc(p.title_ko||'상품')} ${i+1}">`;b.onclick=()=>select(i);$('thumbs').appendChild(b)});if(images.length)select(0);$('mainImage').onclick=()=>{if(images[current]){$('zoomImage').src=images[current];$('zoom').classList.add('open')}};
 const variants=p.variants||[];$('variantSelect').innerHTML='';$('variants').innerHTML='';variants.forEach((v,i)=>{const o=document.createElement('option');o.value=v.id||String(i);o.textContent=(v.title||'옵션')+' · '+(v.available?'재고 있음':'품절')+' · '+won(v.price_krw);o.disabled=!v.available;$('variantSelect').appendChild(o);const row=document.createElement('div');row.className='variant';row.innerHTML=`<div><div class="variant-name">${esc(v.title||'옵션')}</div><div class="variant-meta">SKU ${esc(v.sku||'-')} · ${yen(v.price)} · ${won(v.price_krw)}</div></div><span class="badge ${v.available?'in':'out'}">${v.available?'재고 있음':'품절'}</span>`;$('variants').appendChild(row)});const first=[...$('variantSelect').options].find(o=>!o.disabled);if(first)$('variantSelect').value=first.value;
 const chart=p.size_chart;if(chart&&((chart.rows||[]).length||(chart.text_lines||[]).length)){const box=$('sizeChart');box.innerHTML='';if((chart.rows||[]).length){const wrap=document.createElement('div');wrap.className='size-wrap';const t=document.createElement('table');t.className='size-table';const head=document.createElement('tr');(chart.headers||[]).forEach(h=>{const th=document.createElement('th');th.innerHTML=`<div class="head-ko">${esc(headerKo(h))}</div><div class="head-ja">${esc(h)}</div>`;head.appendChild(th)});const thead=document.createElement('thead');thead.appendChild(head);t.appendChild(thead);const tb=document.createElement('tbody');chart.rows.forEach(r=>{const tr=document.createElement('tr');r.forEach(c=>{const td=document.createElement('td');td.textContent=c;tr.appendChild(td)});tb.appendChild(tr)});t.appendChild(tb);wrap.appendChild(t);box.appendChild(wrap)}else{box.textContent=(chart.text_lines||[]).join('\n')}$('sizeSection').hidden=false}
 $('description').textContent=p.description_ko||p.description_ja||'수집된 설명이 없습니다.';$('descriptionJa').textContent=p.description_ja||'';$('jaDetails').hidden=!(p.description_ja&&p.description_ja!==p.description_ko);
 $('order').onclick=()=>{const v=$('variantSelect').value,selected=variants.find(x=>String(x.id)===String(v));if(!v||!selected||!selected.available){alert('구매 가능한 옵션을 선택하세요.');return}location.href='order.html?handle='+encodeURIComponent(p.handle||'')+'&variant='+encodeURIComponent(v)};
 $('loading').hidden=true;$('page').classList.add('ready')}
async function copyLink(){const link=location.href;try{await navigator.clipboard.writeText(link);$('copyLink').textContent='복사 완료';setTimeout(()=>$('copyLink').textContent='상품 링크 복사',1300)}catch(e){prompt('링크를 복사하세요.',link)}}
$('copyLink').onclick=copyLink;$('zoomClose').onclick=()=>$('zoom').classList.remove('open');$('zoom').onclick=e=>{if(e.target===$('zoom'))$('zoom').classList.remove('open')};
try{const p=getProduct();if(!p)throw new Error('상품을 찾지 못했습니다. 목록에서 다시 선택하세요.');render(p)}catch(e){$('loading').hidden=true;$('error').hidden=false;$('error').textContent=e.message||String(e)}
</script>
</body>
</html>
