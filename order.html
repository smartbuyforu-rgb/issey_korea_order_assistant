<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>주문 요청서</title>
<style>
:root{--bg:#f3f2ef;--card:#fff;--line:#deddd8;--text:#20201e;--muted:#777772;--green:#03c75a}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,"Noto Sans KR",sans-serif}.top{padding:12px;background:#fff;border-bottom:1px solid var(--line)}.back{color:#222;text-decoration:none;font-weight:800;font-size:13px}.wrap{max-width:760px;margin:0 auto;padding:12px}.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}.product{display:grid;grid-template-columns:90px 1fr;gap:13px}.product img{width:90px;aspect-ratio:4/5;object-fit:cover;background:#eee;border-radius:9px}.vendor{font-size:10px;color:#666;font-weight:800}.title{font-size:17px;font-weight:900;margin-top:4px;line-height:1.35}.original{font-size:10px;color:#888;margin-top:3px}.option{margin-top:9px;font-size:12px;line-height:1.6}.price{font-size:21px;font-weight:900;margin-top:8px}.jpy{font-size:11px;color:#777}.form h2{font-size:16px;margin:0 0 12px}.field{margin-top:11px}.field label{display:block;font-size:11px;font-weight:800;margin-bottom:5px}.field input,.field textarea,.field select{width:100%;border:1px solid #bbb;border-radius:9px;padding:10px;background:#fff;font:13px Arial,"Noto Sans KR",sans-serif}.field textarea{min-height:100px;resize:vertical}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:15px}.button{border:0;border-radius:9px;min-height:44px;padding:9px;background:#1b1b1a;color:#fff;font-weight:800;cursor:pointer}.button.quote{background:var(--green)}.button.secondary{background:#fff;color:#222;border:1px solid #aaa}.notice{font-size:10px;color:#777;line-height:1.6;margin-top:12px}.preview{white-space:pre-wrap;background:#f7f6f2;border:1px solid #e1e0db;border-radius:9px;padding:11px;font-size:11px;line-height:1.65;margin-top:10px}.error{max-width:700px;margin:50px auto;padding:24px;background:#fff;border:1px solid var(--line);border-radius:12px;color:#a32929;text-align:center}@media(max-width:540px){.grid,.actions{grid-template-columns:1fr}.product{grid-template-columns:74px 1fr}.product img{width:74px}}
</style>
</head>
<body>
<header class="top"><a id="back" class="back" href="index.html">← 상품 상세로 돌아가기</a></header>
<main id="wrap" class="wrap" hidden>
<section class="card product"><img id="image" alt=""><div><div id="vendor" class="vendor"></div><div id="title" class="title"></div><div id="original" class="original"></div><div id="option" class="option"></div><div id="price" class="price"></div><div id="jpy" class="jpy"></div></div></section>
<section class="card form"><h2>주문 요청 내용</h2><div class="grid"><div class="field"><label for="name">이름</label><input id="name" autocomplete="name" placeholder="이름"></div><div class="field"><label for="contact">연락처</label><input id="contact" placeholder="전화번호·카카오톡·이메일"></div></div><div class="grid"><div class="field"><label for="quantity">수량</label><select id="quantity"><option>1</option><option>2</option><option>3</option></select></div><div class="field"><label for="confirm">재고 확인 동의</label><select id="confirm"><option value="yes">공식 사이트 재확인 필요에 동의</option></select></div></div><div class="field"><label for="note">요청사항</label><textarea id="note" placeholder="배송·사이즈 관련 요청사항을 적어주세요."></textarea></div><div id="preview" class="preview"></div><div class="actions"><button id="copy" class="button" type="button">주문 요청 내용 복사</button><button id="quote" class="button quote" type="button">복사 후 견적 문의 열기</button><a id="official" class="button secondary" target="_blank" rel="noopener">공식 재고 확인</a><a id="list" class="button secondary" href="index.html">상품 목록</a></div><p class="notice">이 페이지는 주문 요청 내용을 정리하는 도구입니다. 자동 주문이나 자동 결제는 실행하지 않습니다. PayPal 로그인과 결제 승인, 최종 주문 확정은 사용자가 공식 사이트에서 직접 진행해야 합니다.</p></section>
</main><div id="error" class="error" hidden></div>
<script src="data/catalog.js"></script>
<script>
const $=id=>document.getElementById(id),payload=window.__ISSEY_CATALOG__||{products:[]};const params=new URLSearchParams(location.search);const handle=params.get('handle'),variantId=params.get('variant');
const won=v=>Number.isFinite(Number(v))?Number(v).toLocaleString('ko-KR')+'원':'-';const yen=v=>Number.isFinite(Number(v))?'¥'+Number(v).toLocaleString('ja-JP'):'-';
const product=(payload.products||[]).find(p=>p.handle===handle);const variant=product&&(product.variants||[]).find(v=>String(v.id)===String(variantId));
function text(){return `[ISSEY MIYAKE 주문 요청]\n상품명: ${product.title_ko||product.title_ja||''}\n일본어 원문: ${product.title_ja||''}\n상품번호: ${product.handle||''}\n선택 옵션: ${variant?.title||''}\nSKU: ${variant?.sku||'-'}\n수량: ${$('quantity').value}\n일본 판매가: ${yen(variant?.price)}\n예상 원화가: ${won(variant?.price_krw)}\n환율: 1엔 = ${Number(payload.exchange_rate?.rate||0).toFixed(4)}원\n이름: ${$('name').value.trim()||'-'}\n연락처: ${$('contact').value.trim()||'-'}\n요청사항: ${$('note').value.trim()||'-'}\n상품 링크: ${new URL('detail.html?handle='+encodeURIComponent(product.handle),location.href).href}\n공식 링크: ${product.url||'-'}\n\n※ 실제 재고와 결제금액은 공식 사이트에서 다시 확인해야 합니다.`}
function update(){if(product&&variant)$('preview').textContent=text()}
async function copy(){const value=text();try{if(navigator.clipboard&&window.isSecureContext)await navigator.clipboard.writeText(value);else{const t=document.createElement('textarea');t.value=value;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove()}$('copy').textContent='복사 완료';setTimeout(()=>$('copy').textContent='주문 요청 내용 복사',1300);return true}catch(e){prompt('아래 내용을 복사하세요.',value);return false}}
if(!product||!variant){$('error').hidden=false;$('error').textContent='상품 또는 옵션 정보를 찾지 못했습니다. 상품 상세에서 다시 선택하세요.'}else{$('wrap').hidden=false;document.title=(product.title_ko||product.title_ja)+' 주문 요청';$('back').href='detail.html?handle='+encodeURIComponent(product.handle);$('image').src=product.image||'';$('vendor').textContent=product.vendor||'ISSEY MIYAKE';$('title').textContent=product.title_ko||product.title_ja;$('original').textContent=product.title_ja||'';$('option').textContent='선택 옵션: '+(variant.title||'옵션')+' · '+(variant.available?'마지막 수집 기준 재고 있음':'마지막 수집 기준 품절');$('price').textContent=won(variant.price_krw);$('jpy').textContent='일본 판매가 '+yen(variant.price);$('official').href=product.url||'#';['name','contact','quantity','note'].forEach(id=>$(id).addEventListener('input',update));$('copy').onclick=copy;$('quote').onclick=async()=>{await copy();window.open(payload.quote_url||'https://blog.naver.com/pilkyu01/224353040280','_blank','noopener')};update()}
</script>
</body>
</html>
